<html lang="it">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #141414;
            --accent-gold: #c5a880;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #262626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.6;
            font-family: 'Montserrat', sans-serif;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 15px;
        }

        header p {
            color: var(--accent-gold);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
        }

        .search-bar input {
            width: 100%;
            padding: 15px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0;
            color: var(--text-main);
            font-size: 1rem;
            letter-spacing: 1px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .filters {
            display: flex;
            gap: 15px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.8rem;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent-gold);
            color: var(--text-main);
            background-color: rgba(197, 168, 128, 0.05);
        }

        .grid-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .perfume-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .perfume-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .code {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-gold);
            letter-spacing: 1px;
        }

        .badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 8px;
            border: 1px solid currentColor;
            font-weight: 600;
        }

        .badge.uomo { color: #5aa1db; }
        .badge.donna { color: #db5a9d; }
        .badge.unisex { color: #9b5adb; }

        .name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.25rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
            color: var(--text-main);
            min-height: 55px;
        }

        .price-list {
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .price-item:last-child {
            margin-bottom: 0;
        }

        .size {
            color: var(--text-muted);
        }

        .price {
            font-weight: 600;
            color: var(--text-main);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            padding: 50px;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            header h1 { font-size: 2rem; }
            .filters { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>

        let currentGender = 'all';

        function getGenderLabel(g) {
            if(g === 'M') return 'Uomo';
            if(g === 'W') return 'Donna';
            return 'Unisex';
        }

        function displayPerfumes() {
            const grid = document.getElementById('perfumeGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';

            const filtered = perfumes.filter(p => {
                const matchesGender = currentGender === 'all' || p.gender === currentGender;
                const cleanCode = p.code.replace('_Bur', '').toLowerCase();
                const matchesSearch = p.name.toLowerCase().includes(searchTerm) || cleanCode.includes(searchTerm);
                
                return matchesGender && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">Nessun profumo trovato con i criteri di ricerca.</div>';
                return;
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'perfume-card';

                let pricesHtml = '';
                p.prices.forEach(pr => {
                    pricesHtml += `
                        <div class="price-item">
                            <span class="size">${pr.size}</span>
                            <span class="price">${pr.p}</span>
                        </div>
                    `;
                });

                const displayCode = p.code.replace('_Bur', '');

                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <span class="code">${displayCode}</span>
                            <span class="badge ${getGenderLabel(p.gender).toLowerCase()}">${getGenderLabel(p.gender)}</span>
                        </div>
                        <div class="name">${p.name}</div>
                    </div>
                    <div class="price-list">
                        ${pricesHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterGender(gender, button) {
            currentGender = gender;

        }
